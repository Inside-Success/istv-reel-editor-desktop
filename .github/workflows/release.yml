name: Release desktop build

# Runs when a version tag (v0.1.6, ...) is pushed, or manually from Actions.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    # One serialized matrix over every artifact we ship. All jobs publish to the
    # SAME GitHub release. package.json sets releaseType: "draft", so the first
    # job CREATES a draft release and every later job FINDS and reuses that same
    # draft to upload into. (With releaseType "release" each job published its
    # own release immediately, so later jobs couldn't find a draft to reuse and
    # electron-builder minted a SECOND release for the tag — the Windows build
    # ended up split off into its own release. Draft-then-publish avoids that.)
    # A separate `publish` job below flips the finished draft to public once, so
    # users never see a half-populated release mid-build.
    #
    # max-parallel: 1 keeps the create/reuse ordering deterministic and dodges
    # the HTTP 422 "already_exists" race two jobs hit creating the draft at once.
    #
    # ffmpeg-static downloads a single binary chosen by npm_config_arch at
    # install time, so each job sets it to its target arch — otherwise every
    # macOS DMG would carry the arm64 host binary and crash on Intel with
    # EBADARCH (-86). ffprobe-static bundles every arch and resolves at runtime.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch: arm64
          - os: macos-14
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # create/update the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (fetch ${{ matrix.arch }} ffmpeg binary)
        run: npm ci
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Build and publish ${{ matrix.platform }} ${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish always

  publish:
    # Flip the fully-populated draft release to public, exactly once, after every
    # OS artifact has been uploaded. Tag pushes only — a workflow_dispatch run has
    # no tag to publish.
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --latest
